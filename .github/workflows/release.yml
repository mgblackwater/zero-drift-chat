name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.toml version matches CHANGELOG
        run: |
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if ! grep -q "## v$CARGO_VER" CHANGELOG.md; then
            echo "ERROR: Cargo.toml version $CARGO_VER not found in CHANGELOG.md"
            exit 1
          fi
          echo "OK: v$CARGO_VER found in CHANGELOG.md"

  version:
    runs-on: ubuntu-latest
    needs: version-check
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      cargo_version: ${{ steps.compute.outputs.cargo_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version and tag
        id: compute
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag="v${cargo_version}-build.${{ github.run_number }}"
          echo "cargo_version=${cargo_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag ${{ steps.compute.outputs.tag }}
          git push origin ${{ steps.compute.outputs.tag }}

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zero-drift-chat-windows-x86_64.exe
            binary: zero-drift-chat.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: zero-drift-chat-macos-aarch64
            binary: zero-drift-chat
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: zero-drift-chat-linux-x86_64
            binary: zero-drift-chat

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg-staging
          cp ${{ matrix.artifact }} dmg-staging/
          hdiutil create -srcfolder dmg-staging -format UDZO zero-drift-chat-macos-aarch64.dmg

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: zero-drift-chat-macos-aarch64.dmg
          path: zero-drift-chat-macos-aarch64.dmg

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/zero-drift-chat-windows-x86_64.exe/zero-drift-chat-windows-x86_64.exe
            artifacts/zero-drift-chat-macos-aarch64/zero-drift-chat-macos-aarch64
            artifacts/zero-drift-chat-macos-aarch64.dmg/zero-drift-chat-macos-aarch64.dmg
            artifacts/zero-drift-chat-linux-x86_64/zero-drift-chat-linux-x86_64
